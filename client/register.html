<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація — DriveX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<header class="site-header">
    <div class="site-header__inner">
        <a href="/" class="site-header__logo">drive<span class="x">[X]</span></a>
        <div class="site-header__actions" id="header-actions"></div>
    </div>
</header>

<div class="auth-page">
    <div class="auth-card fade-up">
        <div class="section__eyebrow">DriveX · реєстрація</div>
        <h2>Створити акаунт</h2>
        <div class="subtitle">Один профіль — повний доступ до парку.</div>

        <div class="error" id="auth-error" style="display:none;"></div>

        <form id="register-form">
            <div class="field">
                <label for="full_name">Ім'я та прізвище</label>
                <input type="text" id="full_name" required>
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="field">
                <label for="phone">Телефон (+380...)</label>
                <input type="tel" id="phone" placeholder="+380501234567" required>
            </div>
            <div class="field">
                <label for="password">Пароль (мінімум 6 символів)</label>
                <input type="password" id="password" required minlength="6">
            </div>
            <button type="submit" class="submit-btn btn-primary">Створити акаунт</button>
        </form>

        <div class="swap">
            Вже маєте акаунт? <a href="/login.html">Увійти</a>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
